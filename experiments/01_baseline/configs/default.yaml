tier: t2
device: cuda
# precision is currently controlled by the model constructors (e.g.
# models/small.py's autocast=True), not by this key.
precision: fp32

model:
  name: AuroraSmall
  embed_dim: 256
  depths: [2, 6, 2]
  num_heads: 8
  patch_size: 4

data:
  root: "/g/data/lm70/aurora/datasets/"
  nc_filename: "aurora_{year}_1.40625deg.nc"
  static_nc: "aurora_const_1.40625deg.nc"
  resolution: "1.40625deg"
  grid: [128, 256]
  train_year_start: 2000.0
  train_year_end: 2007.0
  val_year_start: 2008.0
  val_year_end: 2008.0
  test_year_start: 2009.0
  test_year_end: 2009.0

training:
  batch_size: 16
  num_workers: 10
  # not read anywhere in train.py — same caveat as top-level `precision`.
  autocast: true
